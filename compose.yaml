services:
  alarm-dashboard:
    build: .
    image: alarm-dashboard:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Example override: ensure container timezone if desired
      - TZ=Europe/Berlin
      # Gunicorn worker/thread count – keep workers=1 unless using sticky sessions.
      # See Dockerfile comment for details.
      - ALARM_DASHBOARD_GUNICORN_WORKERS=${ALARM_DASHBOARD_GUNICORN_WORKERS:-1}
      - ALARM_DASHBOARD_GUNICORN_THREADS=${ALARM_DASHBOARD_GUNICORN_THREADS:-8}
    volumes:
      - ./instance:/app/instance
    networks:
      - alarm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  alarm-net:
    driver: bridge
